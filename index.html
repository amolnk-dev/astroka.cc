<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Astroka - AI Agents, Custom Software Development & Cloud Solutions</title>
    <meta name="description" content="Astroka delivers AI-powered agents, custom software development, web & mobile apps, cloud solutions, and digital transformation services. Voice agents, chat agents, LeadGen agents, and enterprise automation." />
    <meta name="keywords" content="AI agents, voice agent, chat agent, lead generation AI, custom software development, web development, mobile app development, cloud solutions, DevOps, API integration, CRM development, UI/UX design, data engineering, generative AI, RAG, LLM automation" />
    <meta name="author" content="Astroka" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://astroka.cc" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://astroka.cc" />
    <meta property="og:title" content="Astroka - AI Agents, Custom Software Development & Cloud Solutions" />
    <meta property="og:description" content="Deploy intelligent AI agents and custom software solutions. Voice agents, chat agents, LeadGen automation, and enterprise digital transformation." />
    <meta property="og:site_name" content="Astroka" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Astroka - AI Agents & Software Development" />
    <meta name="twitter:description" content="AI-powered business automation, custom software, and cloud solutions for modern enterprises." />
    
    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Astroka",
      "url": "https://astroka.cc",
      "description": "AI agents, custom software development, and cloud solutions provider",
      "sameAs": [],
      "offers": {
        "@type": "AggregateOffer",
        "offerCount": "15",
        "highPrice": "100000",
        "lowPrice": "5000",
        "priceCurrency": "USD"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Technology Services",
        "itemListElement": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "AI Agent Development",
              "description": "Custom AI agents including voice agents, chat agents, and automation solutions"
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Custom Software Development",
              "description": "Enterprise software, CRM systems, and web applications"
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Cloud Solutions",
              "description": "AWS, Azure, GCP infrastructure and DevOps services"
            }
          }
        ]
      }
    }
    </script>
    
    <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
